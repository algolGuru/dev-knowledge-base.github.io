<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Knowledge Base — Список</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="grain"></div>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-dot"></div>
      knowledge.base
    </div>
    <div class="view-tabs">
      <a class="view-tab active" href="./">&#8801; Список</a>
      <a class="view-tab" href="tree/">&#9671; Дерево</a>
    </div>
    <div class="progress-bar">
      <span id="progress-text">0 / 64</span>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="sync-dot" id="sync-dot" title="Статус синхронизации"></div>
      <span class="sync-label" id="sync-label"></span>
    </div>
  </div>
</header>

<div class="container">
  <div class="hero">
    <h1>Карта <em>знаний</em> разработчика</h1>
    <p>Интерактивный справочник по архитектуре, паттернам, EF&nbsp;Core, Web&nbsp;API и безопасности. Отмечай изученные темы и отслеживай прогресс.</p>
  </div>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input class="search-input" type="text" id="search" placeholder="Поиск по темам..." autocomplete="off">
  </div>

  <div class="filters" id="filters"></div>

  <div class="stats-bar" id="stats-bar"></div>

  <div id="sections"></div>

  <div class="empty-state" id="empty" style="display:none">
    <span>&#128269;</span>
    Ничего не найдено. Попробуй другой запрос.
  </div>

  <div class="footer">
    dev knowledge base &mdash; отслеживай свой прогресс обучения
  </div>
</div>

<script src="data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="app.js"></script>

</body>
</html>
