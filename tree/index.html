<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Knowledge Base — Дерево</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
</head>
<body>

<div class="grain"></div>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-dot"></div>
      knowledge.base
    </div>
    <div class="view-tabs">
      <a class="view-tab" href="../">&#8801; Список</a>
      <a class="view-tab active" href="./">&#9671; Дерево</a>
    </div>
    <div class="progress-bar">
      <span id="progress-text">0 / 64</span>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="sync-dot" id="sync-dot" title="Статус синхронизации"></div>
      <span class="sync-label" id="sync-label"></span>
    </div>
  </div>
</header>

<div id="tree-view" class="tree-view-fullpage">
  <svg id="tree-canvas" class="tree-canvas"></svg>
</div>

<div id="tree-popup" class="tree-popup" style="display:none">
  <button class="tree-popup-close" onclick="closeTreePopup()">&#10005;</button>
  <div class="tree-popup-title" id="tree-popup-title"></div>
  <div class="tree-popup-desc" id="tree-popup-desc"></div>
  <div class="tree-popup-links" id="tree-popup-links"></div>
  <div class="tree-popup-comments" id="tree-popup-comments"></div>
</div>

<script src="../data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
<script src="app.js"></script>

</body>
</html>
