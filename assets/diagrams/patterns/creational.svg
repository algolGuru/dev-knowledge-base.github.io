<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="320" height="160" role="img" aria-label="Creational patterns diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#24160d"/>
      <stop offset="100%" stop-color="#0f1118"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f6ad55"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="480" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="912" height="432" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="56" y="80" fill="#ffe4b5" font-size="34" font-family="JetBrains Mono, Consolas, monospace" font-weight="700">CREATIONAL</text>
  <text x="56" y="118" fill="#a5a3b8" font-size="22" font-family="JetBrains Mono, Consolas, monospace">Factory Method, Builder, Prototype</text>

  <g filter="url(#glow)">
    <rect x="70" y="190" width="170" height="86" rx="18" fill="#1a1f2c" stroke="#f6ad55" stroke-width="3"/>
    <text x="155" y="238" fill="#fff7ed" font-size="28" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace">Client</text>
  </g>

  <g>
    <rect x="320" y="150" width="190" height="62" rx="16" fill="#2a1a10" stroke="#f6ad55" stroke-width="2"/>
    <text x="415" y="190" fill="#ffddb0" font-size="22" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace">Factory</text>
    <rect x="320" y="232" width="190" height="62" rx="16" fill="#2a1a10" stroke="#f6ad55" stroke-width="2"/>
    <text x="415" y="272" fill="#ffddb0" font-size="22" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace">Builder</text>
    <rect x="320" y="314" width="190" height="62" rx="16" fill="#2a1a10" stroke="#f6ad55" stroke-width="2"/>
    <text x="415" y="354" fill="#ffddb0" font-size="22" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace">Prototype</text>
  </g>

  <g stroke="url(#accent)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M240 233 H305"/>
    <path d="M289 225 L305 233 L289 241"/>
    <path d="M510 182 H640"/>
    <path d="M624 174 L640 182 L624 190"/>
    <path d="M510 263 H640"/>
    <path d="M624 255 L640 263 L624 271"/>
    <path d="M510 345 H640"/>
    <path d="M624 337 L640 345 L624 353"/>
  </g>

  <g>
    <rect x="660" y="150" width="230" height="246" rx="22" fill="#171a24" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <text x="775" y="197" fill="#f8f4eb" font-size="24" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace">Products</text>
    <text x="775" y="240" fill="#cfc8b6" font-size="20" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace">Order</text>
    <text x="775" y="277" fill="#cfc8b6" font-size="20" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace">Report</text>
    <text x="775" y="314" fill="#cfc8b6" font-size="20" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace">Widget</text>
    <text x="775" y="351" fill="#cfc8b6" font-size="20" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace">Parser</text>
  </g>
</svg>
