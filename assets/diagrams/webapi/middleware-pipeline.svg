<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="ASP.NET Core middleware pipeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4fd1c5"/>
    </marker>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <text x="60" y="52" fill="#e2e8f0" font-family="JetBrains Mono, monospace" font-size="26" font-weight="700">Middleware pipeline</text>
  <text x="60" y="86" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="14">each Use(...) can pass control onward or short-circuit</text>

  <g font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">
    <rect x="50" y="190" width="140" height="110" rx="16" fill="rgba(96,165,250,0.08)" stroke="#60a5fa"/>
    <text x="120" y="236" text-anchor="middle" fill="#dbeafe">Request</text>
    <text x="120" y="260" text-anchor="middle" fill="#94a3b8" font-size="12">HTTP in</text>

    <rect x="230" y="160" width="165" height="170" rx="16" fill="rgba(79,209,197,0.12)" stroke="#4fd1c5"/>
    <text x="312" y="205" text-anchor="middle" fill="#cffafe">Use(...)</text>
    <text x="312" y="233" text-anchor="middle" fill="#94a3b8" font-size="12">logging</text>
    <text x="312" y="255" text-anchor="middle" fill="#94a3b8" font-size="12">correlation id</text>
    <text x="312" y="277" text-anchor="middle" fill="#94a3b8" font-size="12">next()</text>

    <rect x="438" y="160" width="165" height="170" rx="16" fill="rgba(251,113,133,0.10)" stroke="#fb7185"/>
    <text x="520" y="205" text-anchor="middle" fill="#ffe4e6">AuthN / AuthZ</text>
    <text x="520" y="233" text-anchor="middle" fill="#94a3b8" font-size="12">user + policy</text>
    <text x="520" y="255" text-anchor="middle" fill="#94a3b8" font-size="12">may reject</text>
    <text x="520" y="277" text-anchor="middle" fill="#94a3b8" font-size="12">401 / 403</text>

    <rect x="646" y="130" width="185" height="230" rx="16" fill="rgba(167,139,250,0.10)" stroke="#a78bfa"/>
    <text x="738" y="175" text-anchor="middle" fill="#f3e8ff">Custom Middleware</text>
    <text x="738" y="205" text-anchor="middle" fill="#94a3b8" font-size="12">domain rules</text>
    <text x="738" y="227" text-anchor="middle" fill="#94a3b8" font-size="12">rate limit</text>
    <text x="738" y="249" text-anchor="middle" fill="#94a3b8" font-size="12">response transform</text>
    <text x="738" y="271" text-anchor="middle" fill="#94a3b8" font-size="12">or terminal Run()</text>

    <rect x="878" y="190" width="130" height="110" rx="16" fill="rgba(110,231,183,0.10)" stroke="#6ee7b7"/>
    <text x="943" y="236" text-anchor="middle" fill="#dcfce7">Endpoint</text>
    <text x="943" y="260" text-anchor="middle" fill="#94a3b8" font-size="12">controller / minimal API</text>

    <rect x="1048" y="190" width="100" height="110" rx="16" fill="rgba(246,173,85,0.10)" stroke="#f6ad55"/>
    <text x="1098" y="236" text-anchor="middle" fill="#fff7ed">Response</text>
    <text x="1098" y="260" text-anchor="middle" fill="#94a3b8" font-size="12">HTTP out</text>
  </g>

  <g stroke="#4fd1c5" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M190 245H230"/>
    <path d="M395 245H438"/>
    <path d="M603 245H646"/>
    <path d="M831 245H878"/>
    <path d="M1008 245H1048"/>
  </g>

  <text x="646" y="385" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="13">Run() ends the chain. Anything after it does not run.</text>
</svg>
