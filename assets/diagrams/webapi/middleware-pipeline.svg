<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-label="ASP.NET Core middleware interception for request and response">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow-request" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4fd1c5"/>
    </marker>
    <marker id="arrow-response" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-warn" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#fb7185"/>
    </marker>
  </defs>

  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>

  <g stroke="rgba(255,255,255,0.08)" fill="none">
    <path d="M40 130H1160"/>
    <path d="M40 280H1160"/>
    <path d="M40 430H1160"/>
  </g>

  <text x="60" y="56" fill="#e2e8f0" font-family="JetBrains Mono, monospace" font-size="26" font-weight="700">Middleware interception</text>
  <text x="60" y="88" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="14">request goes forward, response unwinds backward through the same middleware</text>

  <text x="60" y="120" fill="#4fd1c5" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700">REQUEST PHASE</text>
  <text x="60" y="420" fill="#60a5fa" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700">RESPONSE PHASE</text>

  <g font-family="JetBrains Mono, monospace" font-weight="700">
    <rect x="50" y="165" width="130" height="240" rx="18" fill="rgba(96,165,250,0.10)" stroke="#60a5fa"/>
    <path d="M50 285H180" stroke="rgba(255,255,255,0.10)"/>
    <text x="115" y="212" text-anchor="middle" fill="#dbeafe" font-size="18">Client</text>
    <text x="115" y="238" text-anchor="middle" fill="#94a3b8" font-size="12">sends request</text>
    <text x="115" y="332" text-anchor="middle" fill="#dbeafe" font-size="18">Client</text>
    <text x="115" y="358" text-anchor="middle" fill="#94a3b8" font-size="12">receives response</text>

    <rect x="230" y="165" width="200" height="100" rx="16" fill="rgba(79,209,197,0.12)" stroke="#4fd1c5"/>
    <text x="330" y="198" text-anchor="middle" fill="#d9fffb" font-size="17">Logging</text>
    <text x="330" y="223" text-anchor="middle" fill="#94a3b8" font-size="12">before next()</text>
    <text x="330" y="244" text-anchor="middle" fill="#94a3b8" font-size="12">log request, set id</text>

    <rect x="230" y="305" width="200" height="100" rx="16" fill="rgba(96,165,250,0.10)" stroke="#60a5fa"/>
    <text x="330" y="338" text-anchor="middle" fill="#dbeafe" font-size="17">Logging</text>
    <text x="330" y="363" text-anchor="middle" fill="#94a3b8" font-size="12">after next()</text>
    <text x="330" y="384" text-anchor="middle" fill="#94a3b8" font-size="12">log status, elapsed</text>

    <rect x="460" y="165" width="200" height="100" rx="16" fill="rgba(251,113,133,0.10)" stroke="#fb7185"/>
    <text x="560" y="198" text-anchor="middle" fill="#ffe4e6" font-size="17">Auth / guard</text>
    <text x="560" y="223" text-anchor="middle" fill="#94a3b8" font-size="12">before next()</text>
    <text x="560" y="244" text-anchor="middle" fill="#94a3b8" font-size="12">check user or header</text>

    <rect x="460" y="305" width="200" height="100" rx="16" fill="rgba(96,165,250,0.10)" stroke="#60a5fa"/>
    <text x="560" y="338" text-anchor="middle" fill="#dbeafe" font-size="17">Auth / guard</text>
    <text x="560" y="363" text-anchor="middle" fill="#94a3b8" font-size="12">after next()</text>
    <text x="560" y="384" text-anchor="middle" fill="#94a3b8" font-size="12">pass or shape 401/403</text>

    <rect x="690" y="165" width="200" height="100" rx="16" fill="rgba(167,139,250,0.10)" stroke="#a78bfa"/>
    <text x="790" y="198" text-anchor="middle" fill="#ede9fe" font-size="17">Custom middleware</text>
    <text x="790" y="223" text-anchor="middle" fill="#94a3b8" font-size="12">before next()</text>
    <text x="790" y="244" text-anchor="middle" fill="#94a3b8" font-size="12">validate, rate limit</text>

    <rect x="690" y="305" width="200" height="100" rx="16" fill="rgba(96,165,250,0.10)" stroke="#60a5fa"/>
    <text x="790" y="338" text-anchor="middle" fill="#dbeafe" font-size="17">Custom middleware</text>
    <text x="790" y="363" text-anchor="middle" fill="#94a3b8" font-size="12">after next()</text>
    <text x="790" y="384" text-anchor="middle" fill="#94a3b8" font-size="12">add headers, final polish</text>

    <rect x="960" y="165" width="180" height="240" rx="18" fill="rgba(246,173,85,0.10)" stroke="#f6ad55"/>
    <path d="M960 285H1140" stroke="rgba(255,255,255,0.10)"/>
    <text x="1050" y="212" text-anchor="middle" fill="#fff7ed" font-size="18">Endpoint</text>
    <text x="1050" y="238" text-anchor="middle" fill="#94a3b8" font-size="12">controller / minimal API</text>
    <text x="1050" y="332" text-anchor="middle" fill="#fff7ed" font-size="18">Response</text>
    <text x="1050" y="358" text-anchor="middle" fill="#94a3b8" font-size="12">starts here</text>
  </g>

  <g stroke="#4fd1c5" stroke-width="4" fill="none" marker-end="url(#arrow-request)">
    <path d="M180 215H230"/>
    <path d="M430 215H460"/>
    <path d="M660 215H690"/>
    <path d="M890 215H960"/>
  </g>

  <g stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrow-response)">
    <path d="M960 355H890"/>
    <path d="M690 355H660"/>
    <path d="M460 355H430"/>
    <path d="M230 355H180"/>
  </g>

  <g stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 8" fill="none">
    <path d="M330 265V305"/>
    <path d="M560 265V305"/>
    <path d="M790 265V305"/>
  </g>

  <rect x="420" y="458" width="360" height="62" rx="16" fill="rgba(251,113,133,0.10)" stroke="#fb7185"/>
  <text x="600" y="486" text-anchor="middle" fill="#ffe4e6" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700">No next() = short-circuit</text>
  <text x="600" y="507" text-anchor="middle" fill="#fda4af" font-family="JetBrains Mono, monospace" font-size="12">this middleware creates the response and everything to the right is skipped</text>

  <path d="M560 265C560 350, 520 380, 520 458" fill="none" stroke="#fb7185" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow-warn)"/>
</svg>
