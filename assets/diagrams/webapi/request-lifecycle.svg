<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="HTTP response events around middleware execution">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#6ee7b7"/>
    </marker>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>

  <g stroke="rgba(255,255,255,0.08)" fill="none">
    <path d="M60 100H1140"/>
    <path d="M60 420H1140"/>
  </g>

  <text x="60" y="52" fill="#e2e8f0" font-family="JetBrains Mono, monospace" font-size="26" font-weight="700">Response events around middleware</text>
  <text x="60" y="84" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="14">before next() sees the incoming request, after next() sees the final response state</text>

  <g font-family="JetBrains Mono, monospace" font-weight="700">
    <rect x="60" y="185" width="130" height="110" rx="18" fill="rgba(96,165,250,0.10)" stroke="#60a5fa"/>
    <text x="125" y="230" text-anchor="middle" fill="#dbeafe" font-size="18">Request</text>
    <text x="125" y="256" text-anchor="middle" fill="#94a3b8" font-size="12">arrives</text>

    <rect x="220" y="155" width="180" height="170" rx="18" fill="rgba(79,209,197,0.12)" stroke="#4fd1c5"/>
    <text x="310" y="198" text-anchor="middle" fill="#d9fffb" font-size="17">Middleware</text>
    <text x="310" y="225" text-anchor="middle" fill="#94a3b8" font-size="12">before next()</text>
    <text x="310" y="247" text-anchor="middle" fill="#94a3b8" font-size="12">register OnStarting</text>
    <text x="310" y="269" text-anchor="middle" fill="#94a3b8" font-size="12">register OnCompleted</text>
    <text x="310" y="291" text-anchor="middle" fill="#94a3b8" font-size="12">capture RequestAborted</text>

    <rect x="440" y="155" width="180" height="170" rx="18" fill="rgba(167,139,250,0.10)" stroke="#a78bfa"/>
    <text x="530" y="198" text-anchor="middle" fill="#ede9fe" font-size="17">Downstream</text>
    <text x="530" y="225" text-anchor="middle" fill="#94a3b8" font-size="12">inner middleware</text>
    <text x="530" y="247" text-anchor="middle" fill="#94a3b8" font-size="12">controller / endpoint</text>
    <text x="530" y="269" text-anchor="middle" fill="#94a3b8" font-size="12">writes status + body</text>

    <rect x="660" y="155" width="160" height="170" rx="18" fill="rgba(251,191,36,0.10)" stroke="#f6ad55"/>
    <text x="740" y="198" text-anchor="middle" fill="#fff7ed" font-size="17">OnStarting</text>
    <text x="740" y="225" text-anchor="middle" fill="#94a3b8" font-size="12">last safe moment</text>
    <text x="740" y="247" text-anchor="middle" fill="#94a3b8" font-size="12">for headers and cookies</text>
    <text x="740" y="269" text-anchor="middle" fill="#94a3b8" font-size="12">before first byte</text>

    <rect x="860" y="155" width="170" height="170" rx="18" fill="rgba(96,165,250,0.10)" stroke="#60a5fa"/>
    <text x="945" y="198" text-anchor="middle" fill="#dbeafe" font-size="17">Middleware</text>
    <text x="945" y="225" text-anchor="middle" fill="#94a3b8" font-size="12">after next()</text>
    <text x="945" y="247" text-anchor="middle" fill="#94a3b8" font-size="12">inspect status code</text>
    <text x="945" y="269" text-anchor="middle" fill="#94a3b8" font-size="12">log, metrics, cleanup prep</text>

    <rect x="1050" y="185" width="100" height="110" rx="18" fill="rgba(110,231,183,0.10)" stroke="#6ee7b7"/>
    <text x="1100" y="230" text-anchor="middle" fill="#dcfce7" font-size="18">OnCompleted</text>
    <text x="1100" y="256" text-anchor="middle" fill="#94a3b8" font-size="12">final cleanup</text>
  </g>

  <g stroke="#6ee7b7" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M190 240H220"/>
    <path d="M400 240H440"/>
    <path d="M620 240H660"/>
    <path d="M820 240H860"/>
    <path d="M1030 240H1050"/>
  </g>

  <rect x="660" y="355" width="490" height="46" rx="14" fill="rgba(79,209,197,0.10)" stroke="#4fd1c5"/>
  <text x="905" y="383" text-anchor="middle" fill="#cffafe" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700">response body / flush / streaming</text>

  <path d="M310 345C420 425, 620 425, 790 345" fill="none" stroke="#fb7185" stroke-width="4" stroke-dasharray="8 8"/>
  <text x="550" y="458" text-anchor="middle" fill="#fb7185" font-family="JetBrains Mono, monospace" font-size="13">client disconnect -&gt; RequestAborted can cancel I/O</text>
</svg>
