<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="MVC content negotiation and formatters">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#f6ad55"/>
    </marker>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <text x="60" y="52" fill="#e2e8f0" font-family="JetBrains Mono, monospace" font-size="26" font-weight="700">Content negotiation</text>
  <text x="60" y="86" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="14">ObjectResult picks an output formatter from metadata and Accept</text>

  <g font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">
    <rect x="60" y="185" width="170" height="130" rx="18" fill="rgba(96,165,250,0.12)" stroke="#60a5fa"/>
    <text x="145" y="230" text-anchor="middle" fill="#dbeafe">Accept header</text>
    <text x="145" y="256" text-anchor="middle" fill="#94a3b8" font-size="12">application/json</text>

    <rect x="275" y="155" width="200" height="190" rx="18" fill="rgba(79,209,197,0.10)" stroke="#4fd1c5"/>
    <text x="375" y="200" text-anchor="middle" fill="#cffafe">ObjectResult</text>
    <text x="375" y="228" text-anchor="middle" fill="#94a3b8" font-size="12">ContentTypes / Produces</text>
    <text x="375" y="250" text-anchor="middle" fill="#94a3b8" font-size="12">action return metadata</text>
    <text x="375" y="272" text-anchor="middle" fill="#94a3b8" font-size="12">triggers negotiation</text>

    <rect x="535" y="130" width="210" height="240" rx="18" fill="rgba(167,139,250,0.10)" stroke="#a78bfa"/>
    <text x="640" y="180" text-anchor="middle" fill="#f3e8ff">Formatter selection</text>
    <text x="640" y="210" text-anchor="middle" fill="#94a3b8" font-size="12">JSON</text>
    <text x="640" y="232" text-anchor="middle" fill="#94a3b8" font-size="12">XML</text>
    <text x="640" y="254" text-anchor="middle" fill="#94a3b8" font-size="12">custom</text>
    <text x="640" y="276" text-anchor="middle" fill="#94a3b8" font-size="12">first supported match</text>

    <rect x="805" y="155" width="175" height="190" rx="18" fill="rgba(110,231,183,0.10)" stroke="#6ee7b7"/>
    <text x="892" y="205" text-anchor="middle" fill="#dcfce7">Serialized body</text>
    <text x="892" y="233" text-anchor="middle" fill="#94a3b8" font-size="12">200 / 406 path</text>
    <text x="892" y="255" text-anchor="middle" fill="#94a3b8" font-size="12">MIME + bytes</text>

    <rect x="1020" y="185" width="120" height="130" rx="18" fill="rgba(251,173,85,0.10)" stroke="#f6ad55"/>
    <text x="1080" y="230" text-anchor="middle" fill="#fff7ed">Client</text>
    <text x="1080" y="256" text-anchor="middle" fill="#94a3b8" font-size="12">reads format</text>
  </g>

  <g stroke="#f6ad55" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M230 250H275"/>
    <path d="M475 250H535"/>
    <path d="M745 250H805"/>
    <path d="M980 250H1020"/>
  </g>
</svg>
