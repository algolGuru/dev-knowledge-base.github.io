<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="ASP.NET Core model binding sources">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#a78bfa"/>
    </marker>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <text x="60" y="52" fill="#e2e8f0" font-family="JetBrains Mono, monospace" font-size="26" font-weight="700">Model binding sources</text>
  <text x="60" y="86" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="14">route, query, header, body, form, services, special types</text>

  <g font-family="JetBrains Mono, monospace" font-size="15" font-weight="700">
    <g>
      <rect x="40" y="160" width="120" height="70" rx="16" fill="rgba(96,165,250,0.12)" stroke="#60a5fa"/>
      <text x="100" y="203" text-anchor="middle" fill="#dbeafe">Route</text>
    </g>
    <g>
      <rect x="40" y="245" width="120" height="70" rx="16" fill="rgba(79,209,197,0.12)" stroke="#4fd1c5"/>
      <text x="100" y="288" text-anchor="middle" fill="#cffafe">Query</text>
    </g>
    <g>
      <rect x="40" y="330" width="120" height="70" rx="16" fill="rgba(251,113,133,0.10)" stroke="#fb7185"/>
      <text x="100" y="373" text-anchor="middle" fill="#ffe4e6">Header</text>
    </g>
    <g>
      <rect x="190" y="160" width="120" height="70" rx="16" fill="rgba(167,139,250,0.10)" stroke="#a78bfa"/>
      <text x="250" y="203" text-anchor="middle" fill="#f3e8ff">Body</text>
    </g>
    <g>
      <rect x="190" y="245" width="120" height="70" rx="16" fill="rgba(110,231,183,0.10)" stroke="#6ee7b7"/>
      <text x="250" y="288" text-anchor="middle" fill="#dcfce7">Form</text>
    </g>
    <g>
      <rect x="190" y="330" width="120" height="70" rx="16" fill="rgba(246,173,85,0.10)" stroke="#f6ad55"/>
      <text x="250" y="373" text-anchor="middle" fill="#fff7ed">Services</text>
    </g>
  </g>

  <g font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">
    <rect x="385" y="155" width="270" height="200" rx="20" fill="rgba(15,23,42,0.85)" stroke="#94a3b8"/>
    <text x="520" y="200" text-anchor="middle" fill="#e2e8f0">Value providers</text>
    <text x="520" y="232" text-anchor="middle" fill="#94a3b8" font-size="12">route -> query -> header</text>
    <text x="520" y="254" text-anchor="middle" fill="#94a3b8" font-size="12">body / form / DI</text>
    <text x="520" y="276" text-anchor="middle" fill="#94a3b8" font-size="12">explicit attributes win</text>
    <text x="520" y="298" text-anchor="middle" fill="#94a3b8" font-size="12">special types shortcut</text>

    <rect x="730" y="155" width="185" height="200" rx="20" fill="rgba(79,209,197,0.10)" stroke="#4fd1c5"/>
    <text x="822" y="200" text-anchor="middle" fill="#cffafe">Model binder</text>
    <text x="822" y="232" text-anchor="middle" fill="#94a3b8" font-size="12">converts strings</text>
    <text x="822" y="254" text-anchor="middle" fill="#94a3b8" font-size="12">builds complex types</text>
    <text x="822" y="276" text-anchor="middle" fill="#94a3b8" font-size="12">validates model state</text>

    <rect x="965" y="185" width="160" height="130" rx="18" fill="rgba(167,139,250,0.10)" stroke="#a78bfa"/>
    <text x="1045" y="230" text-anchor="middle" fill="#f3e8ff">Action params</text>
    <text x="1045" y="256" text-anchor="middle" fill="#94a3b8" font-size="12">controller / minimal API</text>
  </g>

  <g stroke="#a78bfa" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M160 205H385"/>
    <path d="M160 290H385"/>
    <path d="M160 375H385"/>
    <path d="M655 255H730"/>
    <path d="M915 255H965"/>
  </g>
</svg>
