<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Pagination flow</title>
  <desc id="desc">Cursor pagination returns a page of items plus a continuation token. The client uses that token to request the next stable slice.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09101d"/>
      <stop offset="100%" stop-color="#13253d"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8bd5ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="212" cy="82" r="120" fill="#8bd5ff" opacity="0.08"/>
  <circle cx="980" cy="320" r="140" fill="#a78bfa" opacity="0.08"/>
  <text x="60" y="68" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="28" font-weight="700">Pagination</text>
  <text x="60" y="102" fill="#9aa4c3" font-family="JetBrains Mono, monospace" font-size="16">page slice + next cursor</text>

  <g filter="url(#shadow)">
    <rect x="70" y="168" width="150" height="88" rx="18" fill="#182034" stroke="#2b3553"/>
    <rect x="322" y="138" width="250" height="148" rx="22" fill="#1e2a45" stroke="#3c4a73"/>
    <rect x="694" y="168" width="150" height="88" rx="18" fill="#182034" stroke="#2b3553"/>
    <rect x="928" y="168" width="150" height="88" rx="18" fill="#182034" stroke="#2b3553"/>
  </g>

  <text x="145" y="205" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">Client</text>
  <text x="447" y="190" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">Page 1</text>
  <text x="447" y="220" text-anchor="middle" fill="#9aa4c3" font-family="JetBrains Mono, monospace" font-size="14">items + nextCursor</text>
  <text x="447" y="246" text-anchor="middle" fill="#9aa4c3" font-family="JetBrains Mono, monospace" font-size="14">stable order</text>
  <text x="769" y="205" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">Page 2</text>
  <text x="1003" y="205" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">Page 3</text>

  <path d="M220 214 L314 214" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <path d="M314 214 L300 204 L300 224 Z" fill="#8bd5ff"/>
  <path d="M572 214 L686 214" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <path d="M686 214 L672 204 L672 224 Z" fill="#a78bfa"/>
  <path d="M844 214 L920 214" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <path d="M920 214 L906 204 L906 224 Z" fill="#8bd5ff"/>

  <path d="M447 286 C447 338 626 338 768 286" fill="none" stroke="#f6ad55" stroke-width="4" stroke-dasharray="12 10"/>
  <text x="610" y="356" text-anchor="middle" fill="#f6ad55" font-family="JetBrains Mono, monospace" font-size="14">offset pages drift; cursor pages keep their place</text>
</svg>
