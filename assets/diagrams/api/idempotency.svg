<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Idempotency flow</title>
  <desc id="desc">Client retries a request with the same idempotency key. The API stores the first result and returns the same outcome for duplicates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#121a2f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="170" cy="76" r="120" fill="#60a5fa" opacity="0.08"/>
  <circle cx="1040" cy="330" r="140" fill="#6ee7b7" opacity="0.08"/>
  <text x="60" y="68" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="28" font-weight="700">Idempotency</text>
  <text x="60" y="102" fill="#9aa4c3" font-family="JetBrains Mono, monospace" font-size="16">same request key, same outcome</text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="180" height="88" rx="18" fill="#182034" stroke="#2b3553"/>
    <rect x="344" y="150" width="220" height="128" rx="22" fill="#1e2a45" stroke="#3c4a73"/>
    <rect x="672" y="170" width="190" height="88" rx="18" fill="#182034" stroke="#2b3553"/>
    <rect x="936" y="170" width="180" height="88" rx="18" fill="#182034" stroke="#2b3553"/>
  </g>

  <text x="160" y="205" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">Client</text>
  <text x="454" y="196" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">API</text>
  <text x="767" y="205" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="18" font-weight="600">Dedupe store</text>
  <text x="1026" y="205" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">Result</text>

  <text x="454" y="226" text-anchor="middle" fill="#9aa4c3" font-family="JetBrains Mono, monospace" font-size="14">Idempotency-Key</text>
  <text x="454" y="246" text-anchor="middle" fill="#9aa4c3" font-family="JetBrains Mono, monospace" font-size="14">request fingerprint</text>

  <path d="M250 214 L336 214" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M336 214 L322 204 L322 224 Z" fill="#6ee7b7"/>
  <path d="M564 214 L664 214" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M664 214 L650 204 L650 224 Z" fill="#60a5fa"/>
  <path d="M862 214 L928 214" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M928 214 L914 204 L914 224 Z" fill="#6ee7b7"/>

  <path d="M454 278 C454 330 300 330 160 278" fill="none" stroke="#f6ad55" stroke-width="4" stroke-dasharray="12 10"/>
  <text x="304" y="350" text-anchor="middle" fill="#f6ad55" font-family="JetBrains Mono, monospace" font-size="14">duplicate request returns the stored answer</text>

  <rect x="398" y="298" width="112" height="32" rx="16" fill="#0f1729" stroke="#334161"/>
  <text x="454" y="319" text-anchor="middle" fill="#6ee7b7" font-family="JetBrains Mono, monospace" font-size="13">store first result</text>
</svg>
