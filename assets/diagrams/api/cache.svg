<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">HTTP caching flow</title>
  <desc id="desc">Fresh responses are reused from cache. When content ages out, the cache revalidates against origin using validators like ETag or Last-Modified.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111d"/>
      <stop offset="100%" stop-color="#16243b"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8bd5ff"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="214" cy="84" r="120" fill="#8bd5ff" opacity="0.08"/>
  <circle cx="990" cy="320" r="140" fill="#6ee7b7" opacity="0.08"/>
  <text x="60" y="68" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="28" font-weight="700">Caching</text>
  <text x="60" y="102" fill="#9aa4c3" font-family="JetBrains Mono, monospace" font-size="16">cache first, validate when stale</text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="180" height="88" rx="18" fill="#182034" stroke="#2b3553"/>
    <rect x="370" y="150" width="190" height="128" rx="22" fill="#1e2a45" stroke="#3c4a73"/>
    <rect x="658" y="170" width="180" height="88" rx="18" fill="#182034" stroke="#2b3553"/>
    <rect x="932" y="170" width="180" height="88" rx="18" fill="#182034" stroke="#2b3553"/>
  </g>

  <text x="160" y="205" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">Client</text>
  <text x="465" y="196" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">Cache</text>
  <text x="748" y="205" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">Origin</text>
  <text x="1022" y="205" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">Response</text>
  <text x="465" y="226" text-anchor="middle" fill="#9aa4c3" font-family="JetBrains Mono, monospace" font-size="14">freshness lifetime</text>
  <text x="465" y="246" text-anchor="middle" fill="#9aa4c3" font-family="JetBrains Mono, monospace" font-size="14">ETag / Last-Modified</text>

  <path d="M250 214 L362 214" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <path d="M362 214 L348 204 L348 224 Z" fill="#8bd5ff"/>
  <path d="M560 214 L650 214" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <path d="M650 214 L636 204 L636 224 Z" fill="#6ee7b7"/>
  <path d="M840 214 L924 214" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <path d="M924 214 L910 204 L910 224 Z" fill="#8bd5ff"/>

  <path d="M748 278 C748 326 620 328 466 278" fill="none" stroke="#f6ad55" stroke-width="4" stroke-dasharray="12 10"/>
  <text x="604" y="350" text-anchor="middle" fill="#f6ad55" font-family="JetBrains Mono, monospace" font-size="14">stale content is revalidated, not blindly reused</text>

  <rect x="402" y="298" width="128" height="32" rx="16" fill="#0f1729" stroke="#334161"/>
  <text x="466" y="319" text-anchor="middle" fill="#8bd5ff" font-family="JetBrains Mono, monospace" font-size="13">304 or fresh body</text>
</svg>
