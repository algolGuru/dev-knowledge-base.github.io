<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">API Gateway flow</title>
  <desc id="desc">Clients talk to one entry point. The gateway routes requests, applies cross-cutting concerns, and aggregates service responses.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09111f"/>
      <stop offset="100%" stop-color="#18213a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f6ad55"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="1020" cy="86" r="130" fill="#f6ad55" opacity="0.08"/>
  <circle cx="240" cy="320" r="150" fill="#60a5fa" opacity="0.08"/>
  <text x="60" y="68" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="28" font-weight="700">API Gateway</text>
  <text x="60" y="102" fill="#9aa4c3" font-family="JetBrains Mono, monospace" font-size="16">one entry point, many internal services</text>

  <g filter="url(#shadow)">
    <rect x="74" y="168" width="160" height="88" rx="18" fill="#182034" stroke="#2b3553"/>
    <rect x="388" y="146" width="230" height="132" rx="24" fill="#1e2a45" stroke="#3c4a73"/>
    <rect x="856" y="148" width="128" height="92" rx="18" fill="#182034" stroke="#2b3553"/>
    <rect x="856" y="268" width="128" height="92" rx="18" fill="#182034" stroke="#2b3553"/>
    <rect x="1040" y="196" width="108" height="60" rx="16" fill="#182034" stroke="#2b3553"/>
  </g>

  <text x="154" y="205" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">Client</text>
  <text x="503" y="196" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">Gateway</text>
  <text x="920" y="185" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="18" font-weight="600">Service A</text>
  <text x="920" y="305" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="18" font-weight="600">Service B</text>
  <text x="1094" y="230" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="16" font-weight="600">client</text>
  <text x="503" y="230" text-anchor="middle" fill="#9aa4c3" font-family="JetBrains Mono, monospace" font-size="14">auth + cache + throttling</text>
  <text x="503" y="250" text-anchor="middle" fill="#9aa4c3" font-family="JetBrains Mono, monospace" font-size="14">routing + aggregation</text>

  <path d="M234 212 L380 212" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <path d="M380 212 L366 202 L366 222 Z" fill="#f6ad55"/>
  <path d="M618 180 C730 150 792 170 848 184" fill="none" stroke="#6ee7b7" stroke-width="4"/>
  <path d="M618 226 C730 252 792 276 848 302" fill="none" stroke="#60a5fa" stroke-width="4"/>
  <path d="M848 184 L836 176 L836 192 Z" fill="#6ee7b7"/>
  <path d="M848 302 L836 294 L836 310 Z" fill="#60a5fa"/>
  <path d="M984 184 L1032 216" fill="none" stroke="#f6ad55" stroke-width="4"/>
  <path d="M1032 216 L1016 214 L1026 228 Z" fill="#f6ad55"/>
  <path d="M984 304 L1032 244" fill="none" stroke="#f6ad55" stroke-width="4"/>
  <path d="M1032 244 L1018 248 L1032 256 Z" fill="#f6ad55"/>
  <text x="1078" y="294" text-anchor="middle" fill="#f6ad55" font-family="JetBrains Mono, monospace" font-size="14">single public surface</text>
</svg>
