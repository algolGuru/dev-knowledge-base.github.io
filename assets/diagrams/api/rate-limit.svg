<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Rate limiting flow</title>
  <desc id="desc">A limiter tracks request budget in a window or token bucket. Allowed calls pass through; excess calls get rejected with 429 and Retry-After.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09101d"/>
      <stop offset="100%" stop-color="#20192d"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f6ad55"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="1000" cy="86" r="126" fill="#fb7185" opacity="0.08"/>
  <circle cx="228" cy="324" r="146" fill="#f6ad55" opacity="0.08"/>
  <text x="60" y="68" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="28" font-weight="700">Rate Limiting</text>
  <text x="60" y="102" fill="#9aa4c3" font-family="JetBrains Mono, monospace" font-size="16">budget, window, burst, rejection</text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="180" height="88" rx="18" fill="#182034" stroke="#2b3553"/>
    <rect x="358" y="148" width="234" height="132" rx="22" fill="#1e2a45" stroke="#3c4a73"/>
    <rect x="724" y="170" width="160" height="88" rx="18" fill="#182034" stroke="#2b3553"/>
    <rect x="930" y="170" width="160" height="88" rx="18" fill="#182034" stroke="#2b3553"/>
  </g>

  <text x="160" y="205" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">Client</text>
  <text x="475" y="196" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">Limiter</text>
  <text x="804" y="205" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">Allow</text>
  <text x="1010" y="205" text-anchor="middle" fill="#e8e6f0" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">429</text>
  <text x="475" y="226" text-anchor="middle" fill="#9aa4c3" font-family="JetBrains Mono, monospace" font-size="14">fixed/sliding/token bucket</text>
  <text x="475" y="246" text-anchor="middle" fill="#9aa4c3" font-family="JetBrains Mono, monospace" font-size="14">per key, user, or route</text>

  <path d="M250 214 L350 214" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <path d="M350 214 L336 204 L336 224 Z" fill="#f6ad55"/>
  <path d="M592 182 L716 200" fill="none" stroke="#6ee7b7" stroke-width="4"/>
  <path d="M716 200 L702 194 L700 208 Z" fill="#6ee7b7"/>
  <path d="M592 246 L716 232" fill="none" stroke="#fb7185" stroke-width="4"/>
  <path d="M716 232 L704 224 L702 238 Z" fill="#fb7185"/>
  <path d="M592 214 L724 214" fill="none" stroke="url(#line)" stroke-width="5"/>
  <path d="M724 214 L710 204 L710 224 Z" fill="#f6ad55"/>
  <path d="M880 214 L922 214" fill="none" stroke="#fb7185" stroke-width="5"/>
  <path d="M922 214 L908 204 L908 224 Z" fill="#fb7185"/>
  <text x="953" y="302" text-anchor="middle" fill="#fb7185" font-family="JetBrains Mono, monospace" font-size="14">Retry-After explains when to try again</text>
</svg>
