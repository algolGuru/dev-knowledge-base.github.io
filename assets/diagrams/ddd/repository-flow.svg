<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 170" width="300" height="170" role="img" aria-labelledby="title desc">
  <title id="title">Repository flow</title>
  <desc id="desc">Application talks to repository, repository hides data mapper and database details.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181a24"/>
      <stop offset="100%" stop-color="#12131a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#4fd1c5"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="298" height="168" rx="14" fill="url(#bg)" stroke="rgba(255,255,255,0.08)"/>
  <text x="16" y="22" fill="#f6d365" font-family="monospace" font-size="12" font-weight="700">Repository flow</text>

  <rect x="16" y="64" width="62" height="42" rx="10" fill="#1d2334" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="26" y="82" fill="#60a5fa" font-family="monospace" font-size="9" font-weight="700">Application</text>
  <text x="31" y="95" fill="#9895a8" font-family="monospace" font-size="8">use case</text>

  <rect x="116" y="58" width="72" height="54" rx="10" fill="#1f1f2f" stroke="#a78bfa" stroke-width="1.3"/>
  <text x="127" y="80" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="700">Repository</text>
  <text x="125" y="94" fill="#e8e6f0" font-family="monospace" font-size="8">collection-like API</text>

  <rect x="215" y="58" width="62" height="54" rx="10" fill="#182030" stroke="#6ee7b7" stroke-width="1.2"/>
  <text x="225" y="79" fill="#6ee7b7" font-family="monospace" font-size="10" font-weight="700">DB / ORM</text>
  <text x="223" y="93" fill="#9895a8" font-family="monospace" font-size="8">mapping layer</text>

  <path d="M79 85 H114" fill="none" stroke="#4fd1c5" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M188 85 H213" fill="none" stroke="#4fd1c5" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M213 97 H188" fill="none" stroke="#fb923c" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="188" y="126" fill="#fb923c" font-family="monospace" font-size="8">queries, adds, removes stay behind the abstraction</text>
</svg>
