<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 170" width="300" height="170" role="img" aria-labelledby="title desc">
  <title id="title">Entity vs value object</title>
  <desc id="desc">Comparison of identity-based entity and value-based object.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181a24"/>
      <stop offset="100%" stop-color="#12131a"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="298" height="168" rx="14" fill="url(#bg)" stroke="rgba(255,255,255,0.08)"/>
  <text x="16" y="22" fill="#f6d365" font-family="monospace" font-size="12" font-weight="700">Entity vs Value Object</text>

  <rect x="16" y="40" width="122" height="108" rx="12" fill="#171c2a" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="28" y="58" fill="#60a5fa" font-family="monospace" font-size="10" font-weight="700">Entity</text>
  <rect x="28" y="68" width="42" height="20" rx="6" fill="#202538" stroke="#60a5fa" stroke-width="1"/>
  <text x="36" y="81" fill="#e8e6f0" font-family="monospace" font-size="8">Id</text>
  <text x="28" y="102" fill="#e8e6f0" font-family="monospace" font-size="8">Name</text>
  <text x="28" y="116" fill="#e8e6f0" font-family="monospace" font-size="8">Status</text>
  <text x="28" y="132" fill="#9895a8" font-family="monospace" font-size="8">equality = identity</text>

  <rect x="162" y="40" width="122" height="108" rx="12" fill="#1a1f2b" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="174" y="58" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="700">Value Object</text>
  <text x="174" y="78" fill="#e8e6f0" font-family="monospace" font-size="8">Amount</text>
  <text x="174" y="92" fill="#e8e6f0" font-family="monospace" font-size="8">Currency</text>
  <text x="174" y="108" fill="#e8e6f0" font-family="monospace" font-size="8">immutable</text>
  <text x="174" y="124" fill="#9895a8" font-family="monospace" font-size="8">equality = all values</text>

  <path d="M141 94 H158" fill="none" stroke="#fb923c" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="134" y="86" fill="#fb923c" font-family="monospace" font-size="8">replace</text>
</svg>
