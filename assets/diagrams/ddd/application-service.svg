<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 170" width="300" height="170" role="img" aria-labelledby="title desc">
  <title id="title">Application service</title>
  <desc id="desc">Thin orchestration from UI to domain model and repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181a24"/>
      <stop offset="100%" stop-color="#12131a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#4fd1c5"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="298" height="168" rx="14" fill="url(#bg)" stroke="rgba(255,255,255,0.08)"/>
  <text x="16" y="22" fill="#f6d365" font-family="monospace" font-size="12" font-weight="700">Application service</text>

  <rect x="18" y="20" width="64" height="34" rx="10" fill="#1d2334" stroke="#60a5fa" stroke-width="1.1"/>
  <text x="31" y="40" fill="#60a5fa" font-family="monospace" font-size="9" font-weight="700">UI / API</text>

  <rect x="102" y="58" width="96" height="46" rx="12" fill="#1f1f2f" stroke="#a78bfa" stroke-width="1.4"/>
  <text x="114" y="79" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="700">Command handler</text>
  <text x="116" y="92" fill="#9895a8" font-family="monospace" font-size="8">load, call, save</text>

  <rect x="24" y="114" width="82" height="34" rx="10" fill="#182030" stroke="#6ee7b7" stroke-width="1.1"/>
  <text x="38" y="134" fill="#6ee7b7" font-family="monospace" font-size="9" font-weight="700">Repository</text>

  <rect x="194" y="114" width="82" height="34" rx="10" fill="#182030" stroke="#6ee7b7" stroke-width="1.1"/>
  <text x="210" y="134" fill="#6ee7b7" font-family="monospace" font-size="9" font-weight="700">Unit of work</text>

  <rect x="114" y="118" width="70" height="26" rx="8" fill="#202538" stroke="#4fd1c5" stroke-width="1"/>
  <text x="130" y="135" fill="#e8e6f0" font-family="monospace" font-size="8">Domain</text>

  <path d="M50 54 C50 72, 92 72, 102 77" fill="none" stroke="#4fd1c5" stroke-width="1.1" marker-end="url(#arrow)"/>
  <path d="M150 104 V116" fill="none" stroke="#4fd1c5" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M102 85 H86" fill="none" stroke="#4fd1c5" stroke-width="1.1" marker-end="url(#arrow)"/>
  <path d="M198 85 H214" fill="none" stroke="#4fd1c5" stroke-width="1.1" marker-end="url(#arrow)"/>
</svg>
