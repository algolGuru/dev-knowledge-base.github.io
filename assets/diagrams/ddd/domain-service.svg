<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 170" width="300" height="170" role="img" aria-labelledby="title desc">
  <title id="title">Domain service</title>
  <desc id="desc">A stateless domain service coordinates a rule that does not belong to one entity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181a24"/>
      <stop offset="100%" stop-color="#12131a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#4fd1c5"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="298" height="168" rx="14" fill="url(#bg)" stroke="rgba(255,255,255,0.08)"/>
  <text x="16" y="22" fill="#f6d365" font-family="monospace" font-size="12" font-weight="700">Domain service</text>

  <rect x="18" y="70" width="64" height="38" rx="10" fill="#1c2234" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="30" y="88" fill="#60a5fa" font-family="monospace" font-size="9" font-weight="700">Entity A</text>
  <text x="25" y="100" fill="#9895a8" font-family="monospace" font-size="8">owns state</text>

  <rect x="218" y="70" width="64" height="38" rx="10" fill="#1c2234" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="230" y="88" fill="#60a5fa" font-family="monospace" font-size="9" font-weight="700">Entity B</text>
  <text x="225" y="100" fill="#9895a8" font-family="monospace" font-size="8">owns state</text>

  <rect x="112" y="56" width="76" height="66" rx="12" fill="#1f1f2f" stroke="#a78bfa" stroke-width="1.4"/>
  <text x="125" y="80" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="700">PricingPolicy</text>
  <text x="121" y="94" fill="#e8e6f0" font-family="monospace" font-size="8">stateless logic</text>
  <text x="121" y="106" fill="#9895a8" font-family="monospace" font-size="8">no persistence</text>

  <path d="M82 88 H110" fill="none" stroke="#4fd1c5" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M218 88 H190" fill="none" stroke="#4fd1c5" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="90" y="130" fill="#fb923c" font-family="monospace" font-size="8">use when a rule has no natural owner</text>
</svg>
