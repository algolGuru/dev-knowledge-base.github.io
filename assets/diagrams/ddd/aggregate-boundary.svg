<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 170" width="300" height="170" role="img" aria-labelledby="title desc">
  <title id="title">Aggregate boundary</title>
  <desc id="desc">A root entity owns child entities inside a transactional boundary.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181a24"/>
      <stop offset="100%" stop-color="#12131a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4fd1c5"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="298" height="168" rx="14" fill="url(#bg)" stroke="rgba(255,255,255,0.08)"/>
  <text x="16" y="22" fill="#f6d365" font-family="monospace" font-size="12" font-weight="700">Aggregate boundary</text>
  <text x="18" y="42" fill="#9895a8" font-family="monospace" font-size="9">One root, one consistency boundary</text>

  <rect x="20" y="55" width="165" height="90" rx="12" fill="none" stroke="#a78bfa" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="31" y="74" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="700">Order (root)</text>

  <rect x="34" y="86" width="62" height="24" rx="6" fill="#202538" stroke="#4fd1c5" stroke-width="1"/>
  <text x="43" y="102" fill="#e8e6f0" font-family="monospace" font-size="9">OrderLine</text>

  <rect x="106" y="86" width="64" height="24" rx="6" fill="#202538" stroke="#4fd1c5" stroke-width="1"/>
  <text x="120" y="102" fill="#e8e6f0" font-family="monospace" font-size="9">Address</text>

  <rect x="216" y="70" width="62" height="40" rx="10" fill="#1d2030" stroke="#fb7185" stroke-width="1.2"/>
  <text x="227" y="86" fill="#fb7185" font-family="monospace" font-size="10" font-weight="700">Other</text>
  <text x="227" y="99" fill="#e8e6f0" font-family="monospace" font-size="9">aggregate</text>

  <path d="M18 124 C8 124, 8 96, 28 96" fill="none" stroke="#60a5fa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="8" y="89" fill="#60a5fa" font-family="monospace" font-size="8">commands</text>

  <path d="M185 95 L212 90" fill="none" stroke="#fb7185" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="184" y="130" fill="#fb7185" font-family="monospace" font-size="8">reference by Id, not by direct mutation</text>
</svg>
