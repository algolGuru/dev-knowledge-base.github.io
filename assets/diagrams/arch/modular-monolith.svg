<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Modular Monolith</title>
  <desc id="desc">One deployable monolith that contains multiple independent feature modules with explicit boundaries.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#11131d"/>
      <stop offset="100%" stop-color="#171d2d"/>
    </linearGradient>
  </defs>
  <rect width="960" height="360" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="912" height="312" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="44" y="58" fill="#e8e6f0" font-size="24" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">Modular monolith</text>
  <text x="44" y="83" fill="#9895a8" font-size="13" font-family="JetBrains Mono,monospace">one deployable, many boundaries</text>

  <rect x="68" y="114" width="824" height="196" rx="24" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.10"/>
  <text x="84" y="140" fill="#b7c8ff" font-size="13" font-family="JetBrains Mono,monospace">single application process</text>

  <g>
    <rect x="92" y="160" width="220" height="124" rx="18" fill="#60a5fa" fill-opacity="0.10" stroke="#60a5fa" stroke-opacity="0.35"/>
    <rect x="92" y="160" width="220" height="28" rx="18" fill="#60a5fa" fill-opacity="0.18"/>
    <text x="112" y="180" fill="#d5ecff" font-size="14" font-family="JetBrains Mono,monospace">Orders</text>
    <text x="112" y="208" fill="#dfe8f7" font-size="12" font-family="JetBrains Mono,monospace">API</text>
    <text x="112" y="228" fill="#dfe8f7" font-size="12" font-family="JetBrains Mono,monospace">Application</text>
    <text x="112" y="248" fill="#dfe8f7" font-size="12" font-family="JetBrains Mono,monospace">Domain</text>
    <text x="112" y="268" fill="#dfe8f7" font-size="12" font-family="JetBrains Mono,monospace">Infrastructure</text>
  </g>

  <g>
    <rect x="370" y="160" width="220" height="124" rx="18" fill="#a78bfa" fill-opacity="0.10" stroke="#a78bfa" stroke-opacity="0.35"/>
    <rect x="370" y="160" width="220" height="28" rx="18" fill="#a78bfa" fill-opacity="0.18"/>
    <text x="390" y="180" fill="#ede3ff" font-size="14" font-family="JetBrains Mono,monospace">Billing</text>
    <text x="390" y="208" fill="#e9e2fb" font-size="12" font-family="JetBrains Mono,monospace">API</text>
    <text x="390" y="228" fill="#e9e2fb" font-size="12" font-family="JetBrains Mono,monospace">Application</text>
    <text x="390" y="248" fill="#e9e2fb" font-size="12" font-family="JetBrains Mono,monospace">Domain</text>
    <text x="390" y="268" fill="#e9e2fb" font-size="12" font-family="JetBrains Mono,monospace">Infrastructure</text>
  </g>

  <g>
    <rect x="648" y="160" width="220" height="124" rx="18" fill="#4fd1c5" fill-opacity="0.10" stroke="#4fd1c5" stroke-opacity="0.35"/>
    <rect x="648" y="160" width="220" height="28" rx="18" fill="#4fd1c5" fill-opacity="0.18"/>
    <text x="668" y="180" fill="#e7fffb" font-size="14" font-family="JetBrains Mono,monospace">Identity</text>
    <text x="668" y="208" fill="#e4fbf8" font-size="12" font-family="JetBrains Mono,monospace">API</text>
    <text x="668" y="228" fill="#e4fbf8" font-size="12" font-family="JetBrains Mono,monospace">Application</text>
    <text x="668" y="248" fill="#e4fbf8" font-size="12" font-family="JetBrains Mono,monospace">Domain</text>
    <text x="668" y="268" fill="#e4fbf8" font-size="12" font-family="JetBrains Mono,monospace">Infrastructure</text>
  </g>

  <g fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="6 6">
    <path d="M312 222H370"/>
    <path d="M590 222H648"/>
  </g>
  <text x="341" y="210" text-anchor="middle" fill="#b9c3da" font-size="11" font-family="JetBrains Mono,monospace">public contract</text>
  <text x="619" y="210" text-anchor="middle" fill="#b9c3da" font-size="11" font-family="JetBrains Mono,monospace">integration event</text>

  <rect x="66" y="300" width="828" height="1" fill="#ffffff" fill-opacity="0.08"/>
  <text x="84" y="325" fill="#9895a8" font-size="12" font-family="JetBrains Mono,monospace">The module boundary is the unit of reasoning, not the folder tree.</text>
</svg>