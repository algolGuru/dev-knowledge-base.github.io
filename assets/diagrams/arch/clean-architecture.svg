<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Clean Architecture</title>
  <desc id="desc">Nested layers showing inward dependencies from frameworks to entities.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f1320"/>
      <stop offset="100%" stop-color="#151b2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4fd1c5"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="960" height="360" rx="28" fill="url(#bg)"/>
  <rect x="22" y="22" width="916" height="316" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="44" y="58" fill="#e8e6f0" font-size="24" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">Clean Architecture</text>
  <text x="44" y="83" fill="#9895a8" font-size="13" font-family="JetBrains Mono,monospace">dependencies point inward</text>
  <rect x="720" y="40" width="190" height="34" rx="17" fill="#4fd1c5" fill-opacity="0.10" stroke="#4fd1c5" stroke-opacity="0.45"/>
  <text x="816" y="62" text-anchor="middle" fill="#7ef0e6" font-size="13" font-family="JetBrains Mono,monospace">UI / DB / queue stay outside</text>

  <rect x="120" y="110" width="720" height="190" rx="26" fill="#60a5fa" fill-opacity="0.06" stroke="#60a5fa" stroke-opacity="0.28"/>
  <text x="140" y="136" fill="#9fd1ff" font-size="14" font-family="JetBrains Mono,monospace">Frameworks &amp; Drivers</text>
  <rect x="165" y="145" width="630" height="160" rx="22" fill="#a78bfa" fill-opacity="0.06" stroke="#a78bfa" stroke-opacity="0.28"/>
  <text x="185" y="171" fill="#d7c4ff" font-size="14" font-family="JetBrains Mono,monospace">Interface Adapters</text>
  <rect x="210" y="180" width="540" height="125" rx="20" fill="#f6ad55" fill-opacity="0.06" stroke="#f6ad55" stroke-opacity="0.30"/>
  <text x="230" y="206" fill="#ffd8a5" font-size="14" font-family="JetBrains Mono,monospace">Use Cases</text>
  <rect x="260" y="215" width="440" height="80" rx="18" fill="#4fd1c5" fill-opacity="0.10" stroke="#4fd1c5" stroke-opacity="0.45" filter="url(#glow)"/>
  <text x="480" y="248" text-anchor="middle" fill="#e8ffff" font-size="18" font-family="JetBrains Mono,monospace" font-weight="700">Entities</text>
  <text x="480" y="270" text-anchor="middle" fill="#b9e9e4" font-size="12" font-family="JetBrains Mono,monospace">domain rules live here</text>

  <g fill="none" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="7 7" opacity="0.85">
    <path d="M220 255H260"/>
    <path d="M700 255H740"/>
    <path d="M480 180V215"/>
    <path d="M480 145V180"/>
  </g>
  <g fill="#ffffff" fill-opacity="0.72" font-family="JetBrains Mono,monospace" font-size="11">
    <text x="85" y="240">ASP.NET Core</text>
    <text x="85" y="258">EF Core</text>
    <text x="85" y="276">message bus</text>
    <text x="825" y="240">replaceable details</text>
  </g>
</svg>