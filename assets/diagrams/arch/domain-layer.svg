<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Domain Layer</title>
  <desc id="desc">Core domain concepts centered on an aggregate root, with entities, value objects, domain services, and events around it.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#120f1d"/>
      <stop offset="100%" stop-color="#18142a"/>
    </linearGradient>
  </defs>
  <rect width="960" height="360" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="912" height="312" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="44" y="58" fill="#e8e6f0" font-size="24" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">Domain layer</text>
  <text x="44" y="83" fill="#9895a8" font-size="13" font-family="JetBrains Mono,monospace">rules, invariants, and the business language</text>

  <rect x="350" y="122" width="260" height="118" rx="22" fill="#a78bfa" fill-opacity="0.14" stroke="#a78bfa" stroke-opacity="0.38"/>
  <text x="480" y="160" text-anchor="middle" fill="#f1e8ff" font-size="20" font-family="JetBrains Mono,monospace" font-weight="700">Aggregate Root</text>
  <text x="480" y="185" text-anchor="middle" fill="#efe7ff" font-size="13" font-family="JetBrains Mono,monospace">keeps the invariant boundary together</text>
  <text x="480" y="206" text-anchor="middle" fill="#cbb8f8" font-size="12" font-family="JetBrains Mono,monospace">state changes happen through domain methods</text>

  <g>
    <rect x="120" y="132" width="170" height="54" rx="16" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.35"/>
    <text x="205" y="165" text-anchor="middle" fill="#d8edff" font-size="16" font-family="JetBrains Mono,monospace">Entity</text>
  </g>
  <g>
    <rect x="120" y="226" width="170" height="54" rx="16" fill="#4fd1c5" fill-opacity="0.12" stroke="#4fd1c5" stroke-opacity="0.35"/>
    <text x="205" y="259" text-anchor="middle" fill="#e7fffb" font-size="16" font-family="JetBrains Mono,monospace">Value Object</text>
  </g>
  <g>
    <rect x="670" y="132" width="170" height="54" rx="16" fill="#f6ad55" fill-opacity="0.12" stroke="#f6ad55" stroke-opacity="0.38"/>
    <text x="755" y="165" text-anchor="middle" fill="#fff1df" font-size="16" font-family="JetBrains Mono,monospace">Domain Service</text>
  </g>
  <g>
    <rect x="670" y="226" width="170" height="54" rx="16" fill="#fb7185" fill-opacity="0.12" stroke="#fb7185" stroke-opacity="0.38"/>
    <text x="755" y="259" text-anchor="middle" fill="#ffe1e6" font-size="16" font-family="JetBrains Mono,monospace">Domain Event</text>
  </g>

  <g fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="6 6">
    <path d="M290 159H350"/>
    <path d="M290 253H350"/>
    <path d="M610 159H670"/>
    <path d="M610 253H670"/>
  </g>

  <rect x="300" y="280" width="360" height="34" rx="17" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="480" y="302" text-anchor="middle" fill="#c4c0d7" font-size="12" font-family="JetBrains Mono,monospace">no HTTP, no EF Core, no UI state</text>
</svg>