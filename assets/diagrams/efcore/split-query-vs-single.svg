<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Single query versus split query">
  <rect width="1200" height="700" fill="#0b1020"/>
  <text x="64" y="92" fill="#e8e6f0" font-size="34" font-family="Inter, Segoe UI, sans-serif" font-weight="700">Single query can explode rows; split query keeps shape</text>
  <text x="64" y="128" fill="#9ca3af" font-size="18" font-family="Inter, Segoe UI, sans-serif">one JOIN tree versus several focused round-trips</text>

  <g font-family="Inter, Segoe UI, sans-serif">
    <rect x="70" y="210" width="500" height="270" rx="24" fill="#122031" stroke="#fb7185" stroke-width="2"/>
    <text x="320" y="248" text-anchor="middle" fill="#e8e6f0" font-size="24" font-weight="700">Single query</text>
    <rect x="120" y="294" width="170" height="86" rx="14" fill="#1b2740" stroke="#60a5fa" stroke-width="2"/>
    <text x="205" y="336" text-anchor="middle" fill="#e8e6f0" font-size="18" font-weight="700">Blogs</text>
    <rect x="330" y="260" width="170" height="86" rx="14" fill="#1b2740" stroke="#4fd1c5" stroke-width="2"/>
    <text x="415" y="302" text-anchor="middle" fill="#e8e6f0" font-size="18" font-weight="700">Posts</text>
    <rect x="330" y="360" width="170" height="86" rx="14" fill="#1b2740" stroke="#f6ad55" stroke-width="2"/>
    <text x="415" y="402" text-anchor="middle" fill="#e8e6f0" font-size="18" font-weight="700">Tags</text>
    <text x="320" y="500" text-anchor="middle" fill="#9ca3af" font-size="16">join duplication grows with each included collection</text>

    <rect x="630" y="210" width="500" height="270" rx="24" fill="#171c2a" stroke="#4fd1c5" stroke-width="2"/>
    <text x="880" y="248" text-anchor="middle" fill="#e8e6f0" font-size="24" font-weight="700">Split query</text>
    <rect x="690" y="294" width="120" height="72" rx="14" fill="#1b2740" stroke="#60a5fa" stroke-width="2"/>
    <text x="750" y="336" text-anchor="middle" fill="#e8e6f0" font-size="18" font-weight="700">Blogs</text>
    <rect x="846" y="294" width="120" height="72" rx="14" fill="#1b2740" stroke="#4fd1c5" stroke-width="2"/>
    <text x="906" y="336" text-anchor="middle" fill="#e8e6f0" font-size="18" font-weight="700">Posts</text>
    <rect x="1002" y="294" width="120" height="72" rx="14" fill="#1b2740" stroke="#f6ad55" stroke-width="2"/>
    <text x="1062" y="336" text-anchor="middle" fill="#e8e6f0" font-size="18" font-weight="700">Tags</text>
    <text x="880" y="500" text-anchor="middle" fill="#9ca3af" font-size="16">one query per collection keeps row shape smaller</text>
  </g>

  <path d="M559 343H621" stroke="#64748b" stroke-width="4"/>
  <text x="600" y="558" text-anchor="middle" fill="#f6d365" font-family="Inter, Segoe UI, sans-serif" font-size="18">prefer the shape that matches your data volume and consistency needs</text>
</svg>
