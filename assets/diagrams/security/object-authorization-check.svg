<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Object-level authorization</title>
  <desc id="desc">The API loads the requested object, evaluates whether the current user may access it, and only then returns the resource.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#f6d365"/>
    </marker>
  </defs>
  <rect width="980" height="360" rx="28" fill="#12131a" stroke="#364055"/>
  <text x="42" y="54" fill="#f6d365" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700">Object-level authorization</text>
  <text x="42" y="84" fill="#b8c0d4" font-family="'JetBrains Mono', monospace" font-size="15">Проверяется не только право войти в endpoint, но и право на конкретный объект: заказ, файл, счёт, документ.</text>

  <g font-family="'JetBrains Mono', monospace">
    <rect x="48" y="148" width="196" height="76" rx="18" fill="#1e2333" stroke="#5aa7ff"/>
    <text x="84" y="194" fill="#fff" font-size="21" font-weight="700">GET /orders/841</text>

    <rect x="356" y="120" width="252" height="132" rx="22" fill="#2a2118" stroke="#f6ad55"/>
    <text x="417" y="162" fill="#fff" font-size="22" font-weight="700">Policy handler</text>
    <text x="392" y="194" fill="#ffd59e" font-size="15">load order -> compare owner / role / state</text>
    <text x="418" y="222" fill="#ffd59e" font-size="15">allow or forbid business operation</text>

    <rect x="724" y="84" width="190" height="72" rx="18" fill="#182a27" stroke="#6ee7b7"/>
    <text x="781" y="128" fill="#fff" font-size="20" font-weight="700">200 OK</text>

    <rect x="724" y="206" width="190" height="72" rx="18" fill="#2a1d26" stroke="#fb7185"/>
    <text x="769" y="250" fill="#fff" font-size="20" font-weight="700">403 / 404</text>
  </g>

  <g stroke="#f6d365" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M244 186 H338"/>
    <path d="M608 158 H706"/>
    <path d="M608 224 H706"/>
  </g>

  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#d6d8e4">
    <text x="272" y="172">1. id пришёл от клиента</text>
    <text x="628" y="146">2a. пользователь владеет ресурсом</text>
    <text x="628" y="212">2b. id угадан, но доступ запрещён</text>
  </g>
</svg>
