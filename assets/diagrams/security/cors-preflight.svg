<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 400" role="img" aria-labelledby="title desc">
  <title id="title">CORS preflight</title>
  <desc id="desc">For non-simple cross-origin requests the browser sends an OPTIONS preflight first and only sends the real request if the server allows the origin, method, and headers.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="980" height="400" rx="28" fill="#12131a" stroke="#364055"/>
  <text x="42" y="54" fill="#f6d365" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700">CORS: браузер делает preflight, не ваш backend-клиент</text>
  <text x="42" y="84" fill="#b8c0d4" font-family="'JetBrains Mono', monospace" font-size="15">CORS не заменяет authN/authZ: это браузерное правило доступа к ответу при cross-origin запросе.</text>

  <g font-family="'JetBrains Mono', monospace">
    <rect x="72" y="162" width="194" height="80" rx="18" fill="#1e2333" stroke="#5aa7ff"/>
    <text x="126" y="208" fill="#fff" font-size="22" font-weight="700">SPA</text>

    <rect x="392" y="104" width="196" height="196" rx="20" fill="#2a2118" stroke="#f6ad55"/>
    <text x="432" y="150" fill="#fff" font-size="22" font-weight="700">Browser</text>
    <text x="430" y="186" fill="#ffd59e" font-size="14">checks origin rules</text>
    <text x="430" y="214" fill="#ffd59e" font-size="14">sends OPTIONS preflight if needed</text>
    <text x="430" y="242" fill="#ffd59e" font-size="14">blocks JS from reading disallowed response</text>

    <rect x="714" y="162" width="194" height="80" rx="18" fill="#182a27" stroke="#6ee7b7"/>
    <text x="768" y="208" fill="#fff" font-size="22" font-weight="700">API</text>
  </g>

  <g stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M266 202 H374"/>
    <path d="M588 178 H696"/>
    <path d="M696 228 H588"/>
  </g>

  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#d6d8e4">
    <text x="282" y="188">1. JS asks for cross-origin fetch</text>
    <text x="610" y="166">2. OPTIONS: origin + method + headers</text>
    <text x="604" y="260">3. If allowed, browser sends real request</text>
    <text x="80" y="324">Важно: curl/Postman не подчиняются CORS, поэтому политика не является серверной авторизацией.</text>
  </g>
</svg>
