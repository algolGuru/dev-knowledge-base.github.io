<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Secret loading flow</title>
  <desc id="desc">Applications should load secrets from layered sources such as local user secrets in development and vault-backed providers in production.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#6ee7b7"/>
    </marker>
  </defs>
  <rect width="980" height="360" rx="28" fill="#12131a" stroke="#364055"/>
  <text x="42" y="54" fill="#f6d365" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700">Secret storage: source layering</text>
  <text x="42" y="84" fill="#b8c0d4" font-family="'JetBrains Mono', monospace" font-size="15">Секреты не живут в `appsettings.json` и git: dev использует локальные providers, prod ходит в vault через managed identity.</text>

  <g font-family="'JetBrains Mono', monospace">
    <rect x="60" y="148" width="164" height="82" rx="18" fill="#1e2333" stroke="#5aa7ff"/>
    <text x="112" y="195" fill="#fff" font-size="22" font-weight="700">App</text>

    <rect x="310" y="74" width="188" height="66" rx="18" fill="#182a27" stroke="#6ee7b7"/>
    <text x="350" y="116" fill="#fff" font-size="18" font-weight="700">User Secrets</text>

    <rect x="310" y="156" width="188" height="66" rx="18" fill="#182a27" stroke="#6ee7b7"/>
    <text x="340" y="198" fill="#fff" font-size="18" font-weight="700">Env Vars / CI</text>

    <rect x="310" y="238" width="188" height="66" rx="18" fill="#182a27" stroke="#6ee7b7"/>
    <text x="346" y="280" fill="#fff" font-size="18" font-weight="700">Key Vault</text>

    <rect x="628" y="148" width="272" height="82" rx="18" fill="#2a1d26" stroke="#fb7185"/>
    <text x="676" y="188" fill="#fff" font-size="22" font-weight="700">No secrets in repo</text>
    <text x="672" y="214" fill="#f9bcc8" font-size="14">rotation, audit, least privilege</text>
  </g>

  <g stroke="#6ee7b7" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M224 190 H292"/>
    <path d="M498 104 H610 V170"/>
    <path d="M498 188 H610"/>
    <path d="M498 270 H610 V208"/>
  </g>
</svg>
